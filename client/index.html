      name="description"
      content="Manage fees, attendance, and students with Edigo. Automate installment tracking, monitor attendance, and run your institute efficiently."
    />
    <title>
      Edigo - Institute Management Software for Fees, Attendance &amp; Students
    </title>
    <script>
      (function () {
        try {
          var k = "edigo-theme";
          var v = localStorage.getItem(k);
          if (v !== "light" && v !== "dark" && v !== "auto") v = "auto";
          var dark = false;
          if (v === "dark") dark = true;
          else if (v === "light") dark = false;
          else {
            var h = new Date().getHours();
            dark = !(h >= 7 && h < 19);
          }
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
